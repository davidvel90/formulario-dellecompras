<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva compra</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 24px 16px; }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 0.5px solid #e5e5e0; }
  .card-title { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
  input, select, textarea { width: 100%; padding: 10px 12px; border: 0.5px solid #ddd; border-radius: 10px; font-size: 15px; color: #1a1a1a; background: #fafafa; outline: none; -webkit-appearance: none; font-family: inherit; }
  textarea { resize: vertical; min-height: 90px; }
  input:focus, select:focus, textarea:focus { border-color: #4a90d9; background: #fff; box-shadow: 0 0 0 3px rgba(74,144,217,0.1); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
  .btn:active { opacity: 0.8; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; white-space: nowrap; z-index: 999; }
  .toast.show { display: block; animation: fadeup 0.2s ease; }
  .toast.error { background: #d94a4a; }
  @keyframes fadeup { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>

<h1>Nueva compra</h1>
<p class="subtitle">Completá los datos y se guarda automáticamente en la planilla</p>

<div class="card">
  <div class="card-title">Detalle del producto</div>
  <div class="field">
    <label>Descripción</label>
    <input type="text" id="descripcion" placeholder="Ej: Papel A4 resma" autocomplete="off">
  </div>
  <div class="field">
    <label>Comentarios</label>
    <textarea id="comentarios" placeholder="Ej: Urgente, para la reunión del lunes..."></textarea>
  </div>
</div>

<div class="card">
  <div class="card-title">Cantidad</div>
  <div class="row">
    <div class="field">
      <label>Cantidad</label>
      <input type="number" id="cantidad" placeholder="0" min="1">
    </div>
    <div class="field">
      <label>Unidad</label>
      <select id="unidad">
        <option value="">Unidad</option>
        <option>unidad</option>
        <option>resma</option>
        <option>pack</option>
        <option>caja</option>
        <option>kg</option>
        <option>litro</option>
      </select>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">Fecha y estado</div>
  <div class="field">
    <label>Fecha pedido</label>
    <input type="date" id="fechaPedido">
  </div>
  <div class="field">
    <label>Estado</label>
    <select id="estado">
      <option value="Pendiente">Pendiente</option>
      <option value="Solicitado">Solicitado</option>
      <option value="En proceso">En proceso</option>
      <option value="Recibido">Recibido</option>
      <option value="Cancelado">Cancelado</option>
    </select>
  </div>
</div>

<button class="btn" id="btnEnviar" onclick="enviar()">Guardar compra</button>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQ7l-AminMQICfCXUn7_yWVUj8Hh2g7pbE-KlA0MPbKRL51gYlsqSVhhGgiobn_SX_rA/exec";
const WA_PHONE = "5491154108969";
const WA_APIKEY = "5877375";

const today = new Date().toISOString().split('T')[0];
document.getElementById('fechaPedido').value = today;

function mostrarToast(msg, error) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

async function notificarWhatsApp(campos) {
  const mensaje = "✅ Nueva compra registrada\n" +
    "📦 Descripción: " + campos.descripcion + "\n" +
    "🔢 Cantidad: " + campos.cantidad + " " + campos.unidad + "\n" +
    "📅 Fecha: " + campos.fechaPedido + "\n" +
    "📋 Estado: " + campos.estado +
    (campos.comentarios ? "\n💬 Comentarios: " + campos.comentarios : "");

  const url = "https://api.callmebot.com/whatsapp.php?phone=" + WA_PHONE +
    "&text=" + encodeURIComponent(mensaje) + "&apikey=" + WA_APIKEY;

  try {
    await fetch(url, { mode: 'no-cors' });
  } catch(e) {
    console.log("WhatsApp error:", e);
  }
}

async function enviar() {
  const campos = {
    descripcion: document.getElementById('descripcion').value.trim(),
    comentarios: document.getElementById('comentarios').value.trim(),
    cantidad: parseFloat(document.getElementById('cantidad').value),
    unidad: document.getElementById('unidad').value,
    fechaPedido: document.getElementById('fechaPedido').value,
    estado: document.getElementById('estado').value
  };

  if (!campos.descripcion || !campos.cantidad || !campos.unidad || !campos.fechaPedido) {
    mostrarToast('Completá todos los campos obligatorios', true);
    return;
  }

  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(campos)
    });

    await notificarWhatsApp(campos);

    mostrarToast('Compra guardada en la planilla');
    setTimeout(() => {
      document.querySelectorAll('input').forEach(i => { if (i.type !== 'date') i.value = ''; });
      document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
      document.querySelector('textarea').value = '';
      document.getElementById('fechaPedido').value = today;
      document.getElementById('estado').value = 'Pendiente';
    }, 500);
  } catch(e) {
    mostrarToast('Error al guardar, intentá de nuevo', true);
  }

  btn.disabled = false;
  btn.textContent = 'Guardar compra';
}
</script>
</body>
</html>
